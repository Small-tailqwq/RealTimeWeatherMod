# RealTimeWeatherMod - PR Review via OpenCodeReview
#
# Adapted from https://github.com/alibaba/open-code-review/tree/main/examples/github_actions
#
# Triggers:
#   - PR opened/synchronized (pull_request_target for fork secret access)
#   - Comment on PR starting with /review
#
# Required secret: DEEPSEEK_API_KEY

name: PR Review

concurrency:
  group: pr-review-${{ github.repository }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

on:
  pull_request_target:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/review'))
    runs-on: ubuntu-latest
    steps:
      - name: Get PR context (for comment triggers)
        id: pr-context
        if: github.event_name != 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('base_ref', pullRequest.base.ref);
            core.setOutput('head_sha', pullRequest.head.sha);

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || steps.pr-context.outputs.head_sha }}

      - name: Fetch PR head ref
        run: git fetch origin pull/${{ github.event.pull_request.number || github.event.issue.number }}/head

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenCodeReview
        run: npm install -g @alibaba-group/open-code-review

      - name: Configure OCR
        run: |
          ocr config set llm.url https://opencode.ai/zen/go/v1
          ocr config set llm.auth_token ${{ secrets.DEEPSEEK_API_KEY }}
          ocr config set llm.model deepseek-v4-pro
          ocr config set llm.use_anthropic false

      - name: Run review
        id: review
        timeout-minutes: 20
        run: |
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_REF="${{ steps.pr-context.outputs.base_ref }}"
            HEAD_SHA="${{ steps.pr-context.outputs.head_sha }}"
          fi

          echo "Reviewing PR: ${HEAD_SHA} against origin/${BASE_REF}"

          ocr review \
            --from "origin/${BASE_REF}" \
            --to "${HEAD_SHA}" \
            --audience agent \
            --format json \
            --concurrency 2 \
            --timeout 15 \
            --background "C# Unity BepInEx mod for Chill With You Lo-Fi Story. RealTimeWeatherMod/ (plugin: Core/automation, Patches/Harmony, Services/API, Models/DTO), UnityExplorerMcp/ (MCP bridge), tests/ (xUnit .NET 9). Critical: Unity main thread safety, Harmony patch non-destructiveness, IDisposable cleanup, null safety, API key protection." \
            > /tmp/ocr-result.json 2>/tmp/ocr-stderr.log || true

      - name: Dump review output
        if: always()
        run: |
          echo "=== STDOUT ===" && cat /tmp/ocr-result.json || echo "(empty)"
          echo "=== STDERR ===" && cat /tmp/ocr-stderr.log || echo "(empty)"

      - name: Post review comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let result;
            try {
              const raw = fs.readFileSync('/tmp/ocr-result.json', 'utf8');
              result = JSON.parse(raw);
            } catch (e) {
              console.log('Failed to parse OCR output:', e.message);
              const stderr = fs.existsSync('/tmp/ocr-stderr.log')
                ? fs.readFileSync('/tmp/ocr-stderr.log', 'utf8').trim()
                : '';
              if (stderr) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `âš ď¸Ź **OpenCodeReview** encountered an error:\n${fencedBlock(stderr)}`
                });
              }
              return;
            }

            const comments = result.comments || [];
            const warnings = result.warnings || [];

            if (comments.length === 0) {
              const message = result.message || 'No issues found.';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `âś… **OpenCodeReview**: ${message}`
              });
              return;
            }

            const prNumber = context.issue.number;
            let commitSha;
            if (context.eventName === 'pull_request_target') {
              commitSha = context.payload.pull_request.head.sha;
            } else {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              commitSha = pr.head.sha;
            }

            const reviewComments = [];
            const commentsWithoutLine = [];

            for (const comment of comments) {
              const body = formatComment(comment);
              const hasValidLine = (comment.start_line >= 1) || (comment.end_line >= 1);

              if (!hasValidLine) {
                commentsWithoutLine.push({ comment, body });
                continue;
              }

              const rc = { path: comment.path, body };

              if (comment.start_line >= 1 && comment.end_line >= 1 && comment.start_line !== comment.end_line) {
                rc.start_line = comment.start_line;
                rc.line = comment.end_line;
                rc.start_side = 'RIGHT';
                rc.side = 'RIGHT';
              } else if (comment.end_line >= 1) {
                rc.line = comment.end_line;
                rc.side = 'RIGHT';
              } else {
                rc.line = comment.start_line;
                rc.side = 'RIGHT';
              }

              reviewComments.push({ comment, reviewComment: rc });
            }

            let summaryBody = `đź”Ť **OpenCodeReview** found **${comments.length}** issue(s).`;
            summaryBody += `\n- âś… ${reviewComments.length} inline comment(s)`;
            summaryBody += `\n- đź“ť ${commentsWithoutLine.length} in summary`;
            if (warnings.length > 0) {
              summaryBody += `\n\nâš ď¸Ź ${warnings.length} warning(s) during review.`;
            }

            for (const { comment } of commentsWithoutLine) {
              summaryBody += '\n\n---\n\n';
              summaryBody += formatSummaryEntry(comment);
            }

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                commit_id: commitSha,
                body: summaryBody,
                event: 'COMMENT',
                comments: reviewComments.map(({ reviewComment }) => reviewComment)
              });
              console.log(`Posted review with ${reviewComments.length} inline comments`);
            } catch (e) {
              console.log('Batch review failed, posting individually:', e.message);

              let posted = 0;
              const failed = [];
              for (const { comment, reviewComment } of reviewComments) {
                try {
                  await github.rest.pulls.createReview({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    commit_id: commitSha,
                    body: '',
                    event: 'COMMENT',
                    comments: [reviewComment]
                  });
                  posted++;
                } catch (inner) {
                  failed.push({ comment, error: inner.message });
                  console.log(`Failed: ${reviewComment.path} â€” ${inner.message}`);
                }
              }

              let finalBody = `đź”Ť **OpenCodeReview** found **${comments.length}** issue(s).`;
              finalBody += `\n- âś… ${posted} inline comment(s)`;
              finalBody += `\n- đź“ť ${commentsWithoutLine.length + failed.length} in summary`;
              if (warnings.length > 0) {
                finalBody += `\n\nâš ď¸Ź ${warnings.length} warning(s).`;
              }

              for (const { comment } of commentsWithoutLine) {
                finalBody += '\n\n---\n\n';
                finalBody += formatSummaryEntry(comment);
              }
              for (const { comment, error } of failed) {
                finalBody += '\n\n---\n\n';
                finalBody += `### đź“„ \`${comment.path}\``;
                if (comment.start_line >= 1) finalBody += ` (L${comment.start_line})`;
                finalBody += `\n\nâš ď¸Ź Failed to post inline: ${error}\n\n${comment.content || ''}`;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: finalBody
              });
            }

            function formatComment(comment) {
              let body = comment.content || '';
              if (comment.suggestion_code && comment.existing_code) {
                body += '\n\n**Suggestion:**\n';
                body += fencedBlock(comment.suggestion_code, 'suggestion');
              }
              return body;
            }

            function formatSummaryEntry(comment) {
              let md = `### đź“„ \`${comment.path}\``;
              if (comment.start_line >= 1 && comment.end_line >= 1) {
                md += ` (L${comment.start_line}-L${comment.end_line})`;
              }
              md += '\n\n' + (comment.content || '');
              if (comment.suggestion_code) {
                md += '\n\n<details><summary>đź’ˇ Suggested Change</summary>\n\n';
                md += fencedBlock(comment.suggestion_code) + '\n';
                md += '</details>';
              }
              return md;
            }

            function fencedBlock(content, language) {
              language = language || '';
              const text = String(content || '');
              const matches = text.match(/`+/g) || [];
              const maxTicks = Math.max(3, ...matches.map(t => t.length)) + 1;
              const fence = '`'.repeat(maxTicks);
              return fence + language + '\n' + text + (text.endsWith('\n') ? '' : '\n') + fence;
            }
